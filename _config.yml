baseurl: "" # Leave empty for the root of your site
url: "https://ananya12k.github.io" # Replace with your GitHub Pages URL
avatar: "/images/profile.jpg" # Path to your profile picture
theme: "minimal-mistakes-jekyll"
# remote_theme: "alshedivat/al-folio"

# Social media links
