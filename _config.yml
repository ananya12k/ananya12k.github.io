  - {
      name: "Click to Call",
      link: "tel:+917802032289",
      icon: "fas fa-mobile-alt",
    }
  - {
      name: "Email",
      link: "mailto:ananyakulkarni2103@gmail.com",
      icon: "fas fa-envelope",
    }
  - {
